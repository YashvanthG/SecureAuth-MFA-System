<!DOCTYPE html>
<html>
<head>
    <title>Email Verification - SecureAuth</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
    <span>📧 Email Verification</span>
    <a href="/logout" class="btn btn-sm btn-outline-secondary">Logout</a>
</div>

<!-- CENTER CONTENT -->
<div class="d-flex justify-content-center align-items-center" style="height: 85vh;">

    <div class="auth-box">

        <h4>📧 Verify via Email</h4>

        <p class="text-muted mt-2">
            We can send a One-Time Password (OTP) to your registered email.
        </p>

        <!-- INFO -->
        <div class="info-box text-start mt-3">
            <strong>Why this step?</strong><br><br>

            • Backup authentication method<br>
            • Helps when TOTP is unavailable<br>
            • Ensures secure account access
        </div>

        <!-- ACTION -->
        <form method="POST" action="/send-email-otp" class="mt-4">
            <button type="submit" class="btn btn-primary w-100">
                Send OTP to Email
            </button>
        </form>

        <!-- BACK -->
        <a href="/login" class="d-block mt-3 text-muted">
            ← Cancel and go back
        </a>

    </div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
