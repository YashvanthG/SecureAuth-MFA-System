<!DOCTYPE html>
<html>
<head>
    <title>Setup Authenticator - SecureAuth</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
    <span>🔐 MFA Setup</span>
    <a href="/logout" class="btn btn-sm btn-outline-secondary">Logout</a>
</div>

<!-- CENTER CONTENT -->
<div class="d-flex justify-content-center align-items-center" style="height: 85vh;">

    <div class="auth-box">

        <h4>🔐 Setup Authenticator</h4>
        <p class="text-muted">
            Scan this QR code using your authenticator app
        </p>

        <!-- QR IMAGE -->
        <img src="data:image/png;base64,{{ qr }}" 
             alt="QR Code"
             style="width: 220px; margin: 15px 0;">

        <!-- STEPS -->
        <div class="text-start mt-3" style="font-size: 14px;">
            <strong>Steps:</strong>
            <ul>
                <li>Open Google Authenticator</li>
                <li>Tap the "+" icon</li>
                <li>Select "Scan QR Code"</li>
                <li>Scan the QR above</li>
            </ul>
        </div>

        <div class="input-hint mt-2">
            After setup, use the generated 6-digit code during login
        </div>

        <!-- ACTIONS -->
        <div class="mt-4">

            <a href="/login" class="btn btn-primary w-100 mb-2">
                Go to Login
            </a>

            <a href="/register" class="btn btn-outline-secondary w-100">
                ← Back to Register
            </a>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
