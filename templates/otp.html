<!DOCTYPE html>
<html>
<head>
    <title>Email OTP - SecureAuth</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
    <span>📧 Email Verification</span>
    <a href="/logout" class="btn btn-sm btn-outline-secondary">Logout</a>
</div>

<!-- CENTER CONTENT -->
<div class="d-flex justify-content-center align-items-center" style="height: 85vh;">

    <div class="auth-box">

        <h4>Enter Email OTP</h4>
        <p class="text-muted">
            Check your email and enter the 4-digit code
        </p>

        <!-- ERROR -->
        {% if error %}
            <div class="error-text">{{ error }}</div>
        {% endif %}

        <!-- FORM -->
        <form method="POST" action="/verify-otp">

            <input type="text"
                   name="otp"
                   class="form-control text-center mb-3"
                   placeholder="••••"
                   maxlength="4"
                   pattern="\d{4}"
                   inputmode="numeric"
                   required
                   style="font-size: 22px; letter-spacing: 10px;">

            <div class="input-hint mb-3">
                OTP is valid for 2 minutes
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Verify OTP
            </button>

        </form>

        <!-- RESEND -->
        <form method="POST" action="/send-email-otp" class="mt-3">
            <button type="submit" class="btn btn-outline-secondary w-100">
                Resend OTP
            </button>
        </form>

        <!-- BACK -->
        <p class="mt-3">
            <a href="/login">← Back to Login</a>
        </p>

    </div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
