<!DOCTYPE html>
<html>
<head>
    <title>Setup Authenticator - SecureAuth</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- TOP RIGHT -->
<div style="position:absolute; top:15px; right:20px;">
    <a href="/logout" class="btn btn-sm btn-outline-secondary">Logout</a>
</div>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="auth-box text-center">

        <h4 class="mb-3">🔐 Secure Setup</h4>
        <p class="auth-subtext">
            Scan this QR code using your authenticator app
        </p>

        <!-- 🔥 FIXED QR SIZE -->
        <img src="data:image/png;base64,{{ qr }}" 
             alt="QR Code" 
             style="width:200px; height:200px; object-fit:contain;"
             class="mb-3">

        <!-- STEPS -->
        <div style="text-align:left; font-size:14px;">
            <b>Steps:</b>
            <ul>
                <li>Open Google Authenticator</li>
                <li>Tap "+" icon</li>
                <li>Select "Scan QR Code"</li>
                <li>Scan the code above</li>
            </ul>
        </div>

        <p class="mt-2" style="font-size:14px;">
            After setup, use the generated 6-digit code while logging in.
        </p>

        <!-- ACTION -->
        <a href="/" class="btn btn-primary w-100 mt-3">
            Continue to Login →
        </a>

        <!-- BACK -->
        <div class="mt-3">
            <a href="/register" style="font-size: 14px;">⬅ Back</a>
        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
