<!DOCTYPE html>
<html>
<head>
    <title>TOTP Verification - SecureAuth</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- TOP RIGHT ACTION -->
<div style="position:absolute; top:15px; right:20px;">
    <a href="/logout" class="btn btn-sm btn-outline-secondary">Logout</a>
</div>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="auth-box text-center">

        <h4 class="mb-3">🔐 Security Verification</h4>
        <p class="auth-subtext">
            Enter the 6-digit code from your authenticator app
        </p>

        <!-- ERROR -->
        {% if error %}
            <div class="error-text mb-2">
                {{ error }}
            </div>
        {% endif %}

        <!-- FORM -->
        <form method="POST" action="/verify-totp">

            <input type="text" name="code" class="form-control mb-3 text-center" 
                   placeholder="••••••" maxlength="6" required>

            <button type="submit" class="btn btn-primary w-100">
                Verify
            </button>

        </form>

        <!-- FALLBACK -->
        {% if show_fallback %}
            <hr>
            <p class="success-text">
                Having trouble? Use Email OTP instead
            </p>

            <a href="/send-email-otp" class="btn btn-outline-primary w-100">
                Use Email OTP
            </a>
        {% endif %}

        <!-- BACK -->
        <div class="mt-3">
            <a href="/" style="font-size: 14px;">⬅ Back to Login</a>
        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
