<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - SecureAuth</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- TOP BAR -->
<div class="d-flex justify-content-between align-items-center p-3 bg-white shadow-sm">
    <h5 class="mb-0">🔐 SecureAuth Dashboard</h5>

    <div>
        <a href="/logout" class="btn btn-sm btn-outline-secondary">Logout</a>
    </div>
</div>

<div class="container mt-5 text-center">

    <h3>Welcome, {{ username }} 👋</h3>
    <p class="text-muted">Your system is secured with Multi-Factor Authentication</p>

    <div class="row mt-4 justify-content-center">

        <!-- VIEW LOGS -->
        <div class="col-md-4">
            <div class="card shadow-sm p-3">
                <h5>📊 Activity Logs</h5>
                <p class="text-muted">View your login and security activity</p>
                <a href="/logs/{{ username }}" class="btn btn-primary">View Logs</a>
            </div>
        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
