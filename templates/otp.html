<!DOCTYPE html>
<html>
<head>
    <title>Email OTP - SecureAuth</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- TOP BAR -->
<div class="d-flex justify-content-between align-items-center p-3 bg-white shadow-sm">
    <h5 class="mb-0">📧 Email Verification</h5>

    <div>
        <a href="/dashboard" class="btn btn-sm btn-outline-primary me-2">Dashboard</a>
        <a href="/logout" class="btn btn-sm btn-outline-secondary">Logout</a>
    </div>
</div>

<!-- MAIN -->
<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="auth-box text-center">

        <h4 class="mb-3">Enter Email OTP</h4>
        <p class="text-muted">Check your email and enter the 4-digit code</p>

        {% if error %}
            <p class="error-text">{{ error }}</p>
        {% endif %}

        <!-- VERIFY FORM -->
        <form method="POST" action="/verify-otp">
            <input type="text"
                   name="otp"
                   class="form-control text-center mb-3"
                   placeholder="••••"
                   maxlength="4"
                   inputmode="numeric"
                   pattern="[0-9]*"
                   style="font-size: 22px; letter-spacing: 8px;"
                   required>

            <button type="submit" class="btn btn-primary w-100">
                Verify OTP
            </button>
        </form>

        <!-- TIMER INFO -->
        <p class="text-muted mt-3" style="font-size: 13px;">
            OTP expires in 2 minutes
        </p>

        <!-- 🔥 RESEND OTP -->
        <form method="POST" action="/send-email-otp" class="mt-2">
            <button type="submit" class="btn btn-outline-secondary w-100">
                Resend OTP
            </button>
        </form>

        <a href="/login" class="text-muted d-block mt-3">
            ⬅ Back to Login
        </a>

    </div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
