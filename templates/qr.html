<!DOCTYPE html>
<html>
<head>
    <title>Setup Authenticator - SecureAuth</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
    <span>🔐 MFA Setup Required</span>
    <a href="/logout" class="btn btn-sm btn-outline-secondary">Logout</a>
</div>

<!-- CENTER CONTENT -->
<div class="d-flex justify-content-center align-items-center" style="height: 85vh;">

    <div class="auth-box text-center">

        <h4>🔐 Complete Security Setup</h4>
        <p class="text-muted">
            You must finish setup before logging in
        </p>

        <!-- QR -->
        <img src="data:image/png;base64,{{ qr }}" 
             alt="QR Code"
             style="width: 200px; margin: 15px 0;">

        <!-- STEPS -->
        <div class="text-start mt-3" style="font-size: 14px;">
            <strong>Steps:</strong>
            <ul>
                <li>Open Google Authenticator</li>
                <li>Tap "+" → Scan QR</li>
                <li>Enter the 6-digit code below</li>
            </ul>
        </div>

        <!-- 🔥 IMPORTANT: INPUT -->
        <form method="POST" action="/verify-setup-totp" class="mt-4">

            <input type="text"
                   name="code"
                   class="form-control text-center mb-3"
                   placeholder="Enter 6-digit code"
                   maxlength="6"
                   pattern="\d{6}"
                   required>

            <button type="submit" class="btn btn-primary w-100">
                Verify & Activate
            </button>

        </form>

        <!-- ERROR -->
        {% if error %}
            <div class="error-text mt-2">{{ error }}</div>
        {% endif %}

        <!-- INFO -->
        <div class="input-hint mt-3">
            ⏱ Code refreshes every 30 seconds
        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
