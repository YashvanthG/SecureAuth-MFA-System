<!DOCTYPE html>
<html>
<head>
    <title>Email OTP Confirmation - SecureAuth</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- TOP RIGHT -->
<div style="position:absolute; top:15px; right:20px;">
    <a href="/logout" class="btn btn-sm btn-outline-secondary">Logout</a>
</div>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="auth-box text-center">

        <h4 class="mb-3">⚠️ Verification Required</h4>

        <p class="auth-subtext">
            We couldn’t verify your authenticator code.<br>
            Do you want to receive a one-time password via email?
        </p>

        <!-- ACTIONS -->
        <form method="POST" action="/send-email-otp">

            <button type="submit" class="btn btn-primary w-100 mb-2">
                Yes, Send OTP
            </button>

        </form>

        <a href="/" class="btn btn-outline-secondary w-100">
            Cancel
        </a>

    </div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
