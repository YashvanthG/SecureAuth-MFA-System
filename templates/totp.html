<!DOCTYPE html>
<html>
<head>
    <title>TOTP Verification - SecureAuth</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
    <span>🔐 Secure Verification</span>
    <a href="/logout" class="btn btn-sm btn-outline-secondary">Logout</a>
</div>

<!-- CENTER CONTENT -->
<div class="d-flex justify-content-center align-items-center" style="height: 85vh;">

    <div class="auth-box">

        <h4>🔐 Security Verification</h4>
        <p class="text-muted">
            Enter the 6-digit code from your authenticator app
        </p>

        <!-- ERROR -->
        {% if error %}
            <div class="error-text">{{ error }}</div>
        {% endif %}

        <!-- FORM -->
        <form method="POST" action="/verify-totp">

            <input type="text"
                   name="code"
                   class="form-control text-center mb-3"
                   placeholder="Enter 6-digit code"
                   maxlength="6"
                   pattern="\d{6}"
                   required>

            <!-- 🔥 TIMER -->
            <div id="totp-timer" class="text-muted mb-3"></div>

            <button type="submit" class="btn btn-primary w-100">
                Verify
            </button>

        </form>

        <!-- FALLBACK -->
        {% if show_fallback %}
            <hr>
            <p class="text-muted">Having trouble?</p>

            <a href="/send-email-otp" class="btn btn-outline-primary w-100">
                Use Email OTP instead
            </a>
        {% endif %}

        <!-- BACK -->
        <p class="mt-3">
            <a href="/login">← Back to Login</a>
        </p>

    </div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

<!-- 🔥 TOTP TIMER SCRIPT -->
<script>
    function updateTOTP() {
        const now = Math.floor(Date.now() / 1000);
        const remaining = 30 - (now % 30);

        document.getElementById("totp-timer").innerText =
            "Code refreshes in: " + remaining + "s";
    }

    setInterval(updateTOTP, 1000);
    updateTOTP();
</script>

</body>
</html>
